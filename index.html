<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#lotto-section" class="nav-link">로또번호생성</a>
            <a href="#contact-section" class="nav-link">제휴 및 비즈니스 문의</a>
            <a href="#comments-section" class="nav-link">댓글</a>
        </div>
    </nav>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">🌙 Dark Mode</button>
        </div>
        <div id="lotto-section">
            <h1>Lotto Number Generator</h1>
            <div id="lotto-numbers" class="lotto-numbers-container">
                <!-- Lotto numbers will be displayed here -->
            </div>
            <button id="generate-btn">Generate Numbers</button>
        </div>

        <div id="contact-section" class="contact-section">
            <hr>
            <h3>제휴 및 비즈니스 문의</h3>
            <p style="color: var(--row-text); margin-bottom: 1.5rem; font-size: 0.9rem;">
                서비스 제휴나 비즈니스 관련 문의를 남겨주시면 확인 후 연락드리겠습니다.
            </p>
            <form action="https://formspree.io/f/xzdjnvbd" method="POST" id="contact-form">
                <div class="form-row">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="성함 / 담당자명" required>
                    </div>
                    <div class="form-group">
                        <input type="text" name="company" placeholder="회사명 / 소속" required>
                    </div>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="답변받을 이메일 주소" required>
                </div>
                <div class="form-group">
                    <input type="text" name="subject" placeholder="문의 제목" required>
                </div>
                <div class="form-group">
                    <input type="text" name="subject" placeholder="문의 제목" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 상세히 적어주세요." required></textarea>
                </div>
                <!-- Formspree setting: redirection after submission -->
                <!-- <input type="hidden" name="_next" value="https://yourdomain.com/thanks.html"> -->
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </div>

        <div id="comments-section" class="comments-section">
            <hr>
            <h3>댓글</h3>
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

                var disqus_config = function () {
                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://httpslotto-7vtpagesdev.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
