<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto & Animal Type Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#lotto-section" class="nav-link">로또번호생성</a>
            <a href="#animal-section" class="nav-link">동물상 테스트</a>
            <a href="#contact-section" class="nav-link">제휴 및 비즈니스 문의</a>
            <a href="#comments-section" class="nav-link">댓글</a>
        </div>
    </nav>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">🌙 Dark Mode</button>
        </div>

        <!-- Lotto Section -->
        <div id="lotto-section" class="section">
            <h1>Lotto Number Generator</h1>
            <div id="lotto-numbers" class="lotto-numbers-container">
                <!-- Lotto numbers will be displayed here -->
            </div>
            <button id="generate-btn">Generate Numbers</button>
        </div>

        <!-- Animal Type Test Section -->
        <div id="animal-section" class="section">
            <hr>
            <h3>동물상 테스트 (강아지 vs 고양이)</h3>
            <p style="color: var(--row-text); margin-bottom: 1.5rem; font-size: 0.9rem;">
                카메라를 허용하고 자신의 얼굴이 강아지상인지 고양이상인지 확인해보세요!
            </p>
            <div class="animal-test-container">
                <button type="button" id="start-webcam-btn" onclick="initAnimalTest()">테스트 시작하기</button>
                <div id="webcam-container"></div>
                <div id="label-container"></div>
            </div>
        </div>

        <!-- Contact Section -->
        <div id="contact-section" class="section">
            <hr>
            <h3>제휴 및 비즈니스 문의</h3>
            <p style="color: var(--row-text); margin-bottom: 1.5rem; font-size: 0.9rem;">
                서비스 제휴나 비즈니스 관련 문의를 남겨주시면 확인 후 연락드리겠습니다.
            </p>
            <form action="https://formspree.io/f/xzdjnvbd" method="POST" id="contact-form">
                <div class="form-row">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="성함 / 담당자명" required>
                    </div>
                    <div class="form-group">
                        <input type="text" name="company" placeholder="회사명 / 소속" required>
                    </div>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="답변받을 이메일 주소" required>
                </div>
                <div class="form-group">
                    <input type="text" name="subject" placeholder="문의 제목" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 상세히 적어주세요." required></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </div>

        <!-- Comments Section -->
        <div id="comments-section" class="section">
            <hr>
            <h3>댓글</h3>
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://httpslotto-7vtpagesdev.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
    <script type="text/javascript">
        const ANIMAL_MODEL_URL = "https://teachablemachine.withgoogle.com/models/ins6_LFUe/";
        let model, webcam, labelContainer, maxPredictions;
        let isWebcamStarted = false;

        async function initAnimalTest() {
            if (isWebcamStarted) return;
            isWebcamStarted = true;
            
            const startBtn = document.getElementById("start-webcam-btn");
            startBtn.innerText = "모델 로딩 중...";
            startBtn.disabled = true;

            const modelURL = ANIMAL_MODEL_URL + "model.json";
            const metadataURL = ANIMAL_MODEL_URL + "metadata.json";

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const flip = true;
                webcam = new tmImage.Webcam(250, 250, flip);
                await webcam.setup();
                await webcam.play();
                window.requestAnimationFrame(animalLoop);

                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = ""; // Clear existing
                for (let i = 0; i < maxPredictions; i++) {
                    const labelDiv = document.createElement("div");
                    labelDiv.className = "prediction-label";
                    labelContainer.appendChild(labelDiv);
                }
                startBtn.style.display = "none";
            } catch (error) {
                console.error(error);
                alert("카메라 권한을 허용해주세요.");
                startBtn.innerText = "테스트 시작하기";
                startBtn.disabled = false;
                isWebcamStarted = false;
            }
        }

        async function animalLoop() {
            webcam.update();
            await animalPredict();
            window.requestAnimationFrame(animalLoop);
        }

        async function animalPredict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const probability = (prediction[i].probability * 100).toFixed(0);
                const className = prediction[i].className;
                labelContainer.childNodes[i].innerHTML = `
                    <div class="label-text">${className}: ${probability}%</div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" style="width: ${probability}%"></div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
